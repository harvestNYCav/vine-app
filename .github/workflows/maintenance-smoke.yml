name: Maintenance Smoke

on:
  pull_request:
  push:
    branches: [codex/repo-health-audit-20260629]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: python -m pip install -r scripts/requirements-nysed.txt
      - run: npm test
